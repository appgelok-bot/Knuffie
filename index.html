
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#3a0d1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/src/assets/images/love_compass_logo_1781963777674.jpg">
    <title>Knuffel Kompas</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Dancing+Script:wght@600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Outfit', 'sans-serif'],
              hand: ['Dancing Script', 'cursive'],
            },
            colors: {
              glass: {
                border: 'rgba(255, 255, 255, 0.4)',
                surface: 'rgba(255, 255, 255, 0.2)',
              }
            },
            keyframes: {
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-5px)' },
                '20%, 40%, 60%, 80%': { transform: 'translateX(5px)' },
              }
            },
            animation: {
              shake: 'shake 0.5s cubic-bezier(.36,.07,.19,.97) both',
            }
          }
        }
      }
    </script>
    <style>
      body {
        margin: 0;
        background: radial-gradient(circle at center, #4a101e 0%, #1a050a 100%);
        background-attachment: fixed;
        min-height: 100vh;
        overflow-x: hidden;
        font-family: 'Outfit', sans-serif;
      }
      
      .blob-cont {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        z-index: -1;
        overflow: hidden;
        pointer-events: none;
      }
      .blob {
        position: absolute;
        border-radius: 50%;
        filter: blur(100px);
        opacity: 0.4;
        animation: float 25s infinite ease-in-out alternate;
      }
      .blob-1 { background: #ff4d6d; width: 500px; height: 500px; top: -100px; left: -100px; }
      .blob-2 { background: #5e1c2e; width: 450px; height: 450px; bottom: -50px; right: -50px; animation-delay: -7s; }

      @keyframes float {
        0% { transform: translate(0, 0) scale(1); }
        50% { transform: translate(60px, -60px) scale(1.1); }
        100% { transform: translate(-30px, 30px) scale(0.9); }
      }

      .glass-panel {
        background: rgba(255, 255, 255, 0.08);
        backdrop-filter: blur(25px);
        -webkit-backdrop-filter: blur(25px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
      }
      
      .glass-input {
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.1);
        backdrop-filter: blur(10px);
        color: white;
      }

      @keyframes flicker {
        0% { transform: scale(1) rotate(-1deg); opacity: 0.8; }
        25% { transform: scale(1.1, 1.2) rotate(1deg); opacity: 1; filter: blur(1px); }
        50% { transform: scale(0.9, 1.1) rotate(-0.5deg); opacity: 0.9; }
        75% { transform: scale(1.05, 1.15) rotate(0.5deg); opacity: 1; }
        100% { transform: scale(1) rotate(-1deg); opacity: 0.8; }
      }

      .candle-flame {
        width: 14px;
        height: 24px;
        background: radial-gradient(ellipse at bottom, #fff 0%, #fffde7 20%, #ffd54f 45%, #ff5722 80%, transparent 100%);
        border-radius: 50% 50% 20% 20%;
        box-shadow: 0 -5px 20px rgba(255, 152, 0, 0.9), 0 0 40px rgba(255, 235, 59, 0.6);
        animation: flicker 1.5s infinite ease-in-out;
        position: relative;
        z-index: 10;
      }

      .candle-body {
        width: 14px;
        height: 24px;
        background: linear-gradient(to right, #ffffff, #fff3e0, #fbe9e7);
        border-radius: 4px;
        box-shadow: inset -2px 0 5px rgba(0,0,0,0.1), 0 5px 15px rgba(0,0,0,0.4);
      }

      @keyframes falling {
        0% { transform: translate(0, -10%) rotate(0deg); opacity: 0; }
        10% { opacity: 0.8; }
        90% { opacity: 0.8; }
        100% { transform: translate(100px, 110dvh) rotate(360deg); opacity: 0; }
      }

      .petal {
        position: fixed;
        top: -50px;
        pointer-events: none;
        z-index: 100;
        animation: falling linear infinite;
      }

      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
    <script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@^19.2.3",
    "react/": "https://esm.sh/react@^19.2.3/",
    "react-dom": "https://esm.sh/react-dom@^19.2.3",
    "react-dom/": "https://esm.sh/react-dom@^19.2.3/",
    "lucide-react": "https://esm.sh/lucide-react@^0.561.0",
    "firebase/": "https://esm.sh/firebase@^12.6.0/",
    "firebase/app": "https://esm.sh/firebase@^12.6.0/app",
    "firebase/firestore": "https://esm.sh/firebase@^12.6.0/firestore",
    "firebase/auth": "https://esm.sh/firebase@^12.6.0/auth",
    "firebase/analytics": "https://esm.sh/firebase@^12.6.0/analytics",
    "@google/genai": "https://esm.sh/@google/genai@^1.34.0"
  }
}
</script>
  <link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div class="blob-cont">
      <div class="blob blob-1"></div>
      <div class="blob blob-2"></div>
    </div>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .then(reg => console.log('PWA Service Worker geregistreerd!', reg.scope))
          .catch(err => console.warn('PWA Service Worker registratie mislukt:', err));
      });
    }
  </script>
</body>
</html>
